<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#efe9f9" />
  <title>Așezarea la mese · Find your table</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Jost:wght@300;400;500&display=swap"
    rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">
    <header class="hero">
      <p class="hero__eyebrow">Bine ați venit · Welcome</p>
      <!-- Edit the couple's names here -->
      <h1 class="hero__names">Timea &amp; Sebastian</h1>
      <p class="hero__sub">
        Caută-ți numele ca să afli la ce masă stai
        <span class="hero__sub-en">Search your name to find your table</span>
      </p>
    </header>

    <section class="search">
      <label class="search__label" for="q">
        Numele tău <span class="search__label-en">/ Your name</span>
      </label>
      <div class="search__field">
        <svg class="search__icon" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="11" cy="11" r="7"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input
          id="q"
          type="search"
          inputmode="search"
          autocomplete="off"
          autocapitalize="off"
          spellcheck="false"
          placeholder="Ex: Maria, Popescu…"
          aria-label="Caută numele tău / Search your name" />
      </div>
    </section>

    <section id="results" class="results" aria-live="polite"></section>

    <footer class="foot">
      <p class="foot__copy">© <span id="year"></span> Sebastian Baltean</p>
    </footer>
  </main>

  <!--
    Unde se află fiecare masă în sală · Where each table is located.
    Repere: SCENA (scena), INTRARE (intrarea), ringul de dans (centru).
    Editează liber textul de mai jos pentru fiecare număr de masă.
  -->
  <script>
    window.TABLE_LOCATIONS = {
      1:  { ro: "Lângă intrare, pe partea dreaptă",          en: "By the entrance, right side" },
      2:  { ro: "Partea dreaptă, lângă intrare",             en: "Right side, near the entrance" },
      3:  { ro: "Partea dreaptă, spre scenă",                en: "Right side, toward the stage" },
      4:  { ro: "Partea dreaptă, lângă scenă",               en: "Right side, next to the stage" },
      5:  { ro: "Lângă scenă, pe partea stângă",             en: "Next to the stage, left side" },
      6:  { ro: "Partea stângă, spre scenă",                 en: "Left side, toward the stage" },
      7:  { ro: "Partea stângă, la mijloc",                  en: "Left side, in the middle" },
      8:  { ro: "Partea stângă, lângă intrare",              en: "Left side, near the entrance" },
      9:  { ro: "Lângă ringul de dans, spre intrare",        en: "By the dance floor, toward the entrance" },
      10: { ro: "Lângă ringul de dans, la mijloc",           en: "By the dance floor, in the middle" },
      11: { ro: "Lângă ringul de dans, spre scenă",          en: "By the dance floor, toward the stage" },
      12: { ro: "Lângă scenă (DJ & formația)",               en: "By the stage (DJ & band)" }
    };
  </script>

  <script src="guests.js"></script>
  <script src="app.js"></script>
</body>
</html>
