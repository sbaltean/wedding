<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#efe9f9" />
  <title>Poster · Așezarea la mese</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Jost:wght@300;400;500&display=swap"
    rel="stylesheet" />

  <style>
    :root {
      --bg: #efe9f9;
      --bg-soft: #fbf9ff;
      --ink: #3a3343;
      --ink-soft: #756d83;
      --accent: #8a6db0;
      --accent-deep: #5f4a86;
      --green: #6a5b9a;
      --line: #e2d9f1;
      --shadow: 0 10px 30px rgba(90, 70, 130, 0.12);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }

    body {
      font-family: "Jost", system-ui, -apple-system, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(1200px 700px at 50% -8%, #f7f1ff 0%, transparent 60%),
        var(--bg);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
      -webkit-font-smoothing: antialiased;
    }

    /* ---------- Poster card (A4 portrait proportions) ---------- */
    .poster {
      width: min(100%, 620px);
      aspect-ratio: 210 / 297;
      background: var(--bg-soft);
      border: 1px solid var(--line);
      border-radius: 26px;
      box-shadow: var(--shadow);
      padding: clamp(32px, 6vw, 56px) clamp(28px, 6vw, 52px);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      position: relative;
    }

    /* delicate corner flourishes */
    .poster::before,
    .poster::after {
      content: "❧";
      position: absolute;
      color: var(--accent);
      opacity: 0.55;
      font-size: 1.4rem;
    }
    .poster::before { top: 22px; left: 26px; transform: scaleX(-1); }
    .poster::after  { bottom: 22px; right: 26px; }

    .eyebrow {
      font-size: 0.78rem;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      color: var(--accent);
      margin: 4px 0 14px;
      font-weight: 400;
    }

    .names {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-weight: 500;
      font-size: clamp(2.6rem, 9vw, 3.6rem);
      line-height: 1.04;
      margin: 0;
      color: var(--accent-deep);
      text-wrap: balance;
    }

    .divider {
      color: var(--accent);
      opacity: 0.7;
      font-size: 1.3rem;
      margin: 16px 0 6px;
    }

    .lead {
      font-weight: 300;
      font-size: 1.08rem;
      color: var(--ink);
      margin: 0 auto;
      max-width: 22em;
      line-height: 1.45;
    }
    .lead-en {
      display: block;
      font-size: 0.9rem;
      font-style: italic;
      color: var(--ink-soft);
      opacity: 0.85;
      margin-top: 4px;
    }

    /* ---------- QR ---------- */
    .qr {
      margin: clamp(24px, 5vh, 40px) auto clamp(18px, 4vh, 30px);
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: clamp(16px, 4vw, 26px);
      box-shadow: 0 12px 32px rgba(138, 109, 176, 0.20);
      width: clamp(220px, 56%, 300px);
    }
    .qr svg {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 6px;
    }

    .scan {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: 1.45rem;
      color: var(--green);
      margin: 0 0 2px;
    }
    .scan-en {
      font-style: italic;
      font-size: 0.92rem;
      color: var(--ink-soft);
      margin: 0;
    }

    .url {
      margin-top: auto;
      padding-top: 22px;
      font-size: 0.86rem;
      letter-spacing: 0.04em;
      color: var(--accent-deep);
      word-break: break-all;
    }

    /* ---------- Print ---------- */
    @media print {
      @page { size: A4 portrait; margin: 12mm; }
      body { background: #fff; padding: 0; display: block; }
      .poster {
        width: 100%;
        height: auto;
        aspect-ratio: auto;
        min-height: 96vh;
        border: none;
        border-radius: 0;
        box-shadow: none;
        justify-content: center;
        gap: 8px;
      }
      .qr { box-shadow: none; }
    }
  </style>
</head>
<body>
  <main class="poster">
    <p class="eyebrow">Bine ați venit · Welcome</p>
    <h1 class="names">Timea &amp; Sebastian</h1>
    <div class="divider">❦</div>

    <p class="lead">
      Caută-ți numele ca să afli la ce masă stai
      <span class="lead-en">Scan to find which table you're seated at</span>
    </p>

    <figure class="qr">

      </svg>
    </figure>

    <p class="scan">Scanează codul</p>
    <p class="scan-en">Point your phone camera here</p>

    <p class="url">sbaltean.github.io/wedding</p>
  </main>
</body>
</html>
